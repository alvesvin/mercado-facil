name: Type Check
on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Cache Bun dependencies
        # Use the official GitHub cache action
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache # The path to cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }} # A unique key based on OS and lockfile hash
          restore-keys: |
            ${{ runner.os }}-bun- # Fallback to a broader cache if the primary key misses

      - run: bun type-check
