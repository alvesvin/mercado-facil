name: Isolated Integration Tests
on:
  push:
    branches:
      - test-workflow

env:
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
  ENABLE_SENTRY: false

jobs:
  trpc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Up db
        run: |
          docker buildx build -t mercado-facil-db .docker/postgis-18
          docker run -d --name mercado-facil-db -e POSTGRES_PASSWORD=postgres -p 5432:5432 mercado-facil-db
          while ! docker exec mercado-facil-db pg_isready -U postgres; do
            sleep 1
          done

      - name: Run tests
        run: bun --filter=@mercado-facil/trpc run test
