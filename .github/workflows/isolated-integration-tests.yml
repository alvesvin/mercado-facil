name: Isolated Integration Tests
on:
  push:
    branches:
      - main

env:
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  ENABLE_SENTRY: false

jobs:
  trpc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Up db
        run: |
          docker buildx build -f .docker/postgis-18/Dockerfile -t mercado-facil-db .
          docker run -d --name mercado-facil-db -e POSTGRES_PASSWORD=postgres -p 5432:5432 mercado-facil-db

      - name: Run tests
        run: bun --filter=@mercado-facil/trpc run test
